# Publishes to PyPI via Trusted Publishing (OIDC — no API tokens).
# Trigger: the maintainer publishes a GitHub Release (the human click is the gate).
# One-time PyPI setup: Account → Publishing → add pending publisher
#   project=vouchkit · owner=vouchkit · repository=vouchkit ·
#   workflow=release.yml · environment=pypi

name: Release to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Run tests
        run: uv run --group dev pytest -q
      - name: Build sdist and wheel
        run: uv build
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
